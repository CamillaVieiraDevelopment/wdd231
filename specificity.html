<!DOCTYPE html>
<html lang="en">

<head>

    <title>CSS Specificity Activity</title>

    <link rel="stylesheet" href="styles/specificity.css">

    <style>
        /* Embedded CSS using ID */
        #exampleText {
            color: peru;
        }
