<!DOCTYPE html>
<html lang="en">

<head>

    <!-- ===== BASIC META ===== -->

    <title>Camilla Vieira | WDD231</title>

    <!-- ===== STYLES ===== -->
    <link rel="stylesheet" href="styles/normalize.css">

    <link rel="stylesheet" href="styles/larger.css">
    <link rel="stylesheet" href="styles/navigation.css">


    <!-- ===== GOOGLE FONT ===== -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

    <!-- ===== JAVASCRIPT ===== -->
    <script src="scripts/navigation.js" defer></script>
    <script src="scripts/date.js" defer></script>

<body>

    <!-- ===== HEADER ===== -->

    <header>

        <img src="images/weather.svg" alt="Site Logo">

        <span>Camilla Vieira</span>

        <button id="nav-button" class="hamburger" aria-label="navigation"></button>

    </header>


    <!-- ===== NAVIGATION ===== -->

    <nav>

        <ul class="navigation">

            <li><a href="#">Home</a></li>
            <li><a href="#">Projects</a></li>

            <li><a href="#">Contact</a></li>

        </ul>

    <!-- ===== MAIN CONTENT ===== -->

    <main>

        <h1>Home</h1>

        <div class="grid">

            <section>

                </p>

            </section>

            <section>

            <section class="courses">

                <div class="buttons">

    <!-- ===== FOOTER ===== -->

    <footer>

        <div class="social">

            <a href="https://github.com" target="_blank">
                <img src="images/github.svg" alt="GitHub">
            </a>

            <a href="https://linkedin.com" target="_blank">
                <img src="images/linkedin.svg" alt="LinkedIn">
            </a>

            <a href="https://instagram.com" target="_blank">
                <img src="images/instagram.svg" alt="Instagram">
            </a>

        </div>

        <p>
